name: tender-monitor

on:
  # Hourly. GitHub Actions free-tier cron drops scheduled runs under load — running every
  # hour gives ≥1 successful tick per few hours even during drops, and keeps the per-tick
  # forward-feed backlog small (~1h ≈ 500 items) so watched-entity alerts don't lag.
  schedule:
    - cron: '0 * * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write  # needed to commit state changes back to repo

concurrency:
  group: tender-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node ci.mjs

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _state/ watchlist.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi
          git commit -m "monitor: state update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          # Retry with rebase if origin moved during the run (concurrent push
          # from another workflow or manual commit). State files are append-only
          # / merge-friendly, so rebase is safe.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; pulling --rebase and retrying..."
            git pull --rebase
          done
          echo "Push failed after 3 attempts"
          exit 1
