name: tender-monitor

on:
  # Hourly. GitHub Actions free-tier cron drops scheduled runs under load — running every
  # hour gives ≥1 successful tick per few hours even during drops, and keeps the per-tick
  # forward-feed backlog small (~1h ≈ 500 items) so watched-entity alerts don't lag.
  schedule:
    - cron: '0 * * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write  # needed to commit state changes back to repo

concurrency:
  group: tender-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node ci.mjs

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _state/ watchlist.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
            exit 0
          fi

          # Classify diff: "significant" = anything except the high-frequency feed cursor.
          # _watched_feed_cursor.json drifts on every run even when nothing in the tender
          # world changed, generating ~48 commits/day of pure noise; committing it once
          # every ~6 hours is plenty (the feed cursor lookback handles missed events).
          #
          # _watched_seen.json is NOT debounced: it records which tenders we've already
          # alerted on, so it only changes when a genuinely new watched-entity tender is
          # announced — low frequency, and dropping the change re-alerts that tender on the
          # next run (the duplicate-notification bug fixed here). It must persist on change.
          SIGNIFICANT=$(git diff --staged --name-only \
            | grep -v -E '^_state/_watched_feed_cursor\.json$' || true)

          if [ -z "$SIGNIFICANT" ]; then
            LAST_CURSOR_TS=$(git log -1 --format=%ct --grep='^monitor: cursor sync' 2>/dev/null || echo 0)
            LAST_CURSOR_TS=${LAST_CURSOR_TS:-0}
            NOW=$(date +%s)
            AGE=$((NOW - LAST_CURSOR_TS))
            if [ "$AGE" -lt 21600 ]; then
              echo "Cursor-only diff; last sync ${AGE}s ago (<6h). Skipping commit."
              git reset
              exit 0
            fi
            MSG="monitor: cursor sync $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          else
            MSG="monitor: state update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
          fi

          git commit -m "$MSG"
          # Retry with rebase if origin moved during the run (concurrent push
          # from another workflow or manual commit). State files are append-only
          # / merge-friendly, so rebase is safe.
          for attempt in 1 2 3; do
            if git push; then
              echo "Pushed on attempt $attempt"
              exit 0
            fi
            echo "Push attempt $attempt failed; pulling --rebase and retrying..."
            git pull --rebase
          done
          echo "Push failed after 3 attempts"
          exit 1
