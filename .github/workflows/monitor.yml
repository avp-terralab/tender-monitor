name: tender-monitor

on:
  # 06:00, 10:00, 15:00 UTC = 09:00, 13:00, 18:00 Europe/Kyiv (EEST = UTC+3)
  schedule:
    - cron: '0 6,10,15 * * *'
  # Allow manual trigger from Actions tab
  workflow_dispatch:

permissions:
  contents: write  # needed to commit state changes back to repo

concurrency:
  group: tender-monitor
  cancel-in-progress: false

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Run tests
        working-directory: .
        run: |
          node --test test/compare.test.mjs test/prozorro.test.mjs test/telegram.test.mjs test/monitor.test.mjs

      - name: Run monitor
        env:
          TELEGRAM_BOT_TOKEN: ${{ secrets.TELEGRAM_BOT_TOKEN }}
          TELEGRAM_CHAT_ID: ${{ secrets.TELEGRAM_CHAT_ID }}
        run: node ci.mjs

      - name: Commit state changes
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add _state/ watchlist.json
          if git diff --staged --quiet; then
            echo "No state changes to commit."
          else
            git commit -m "monitor: state update $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            git push
          fi
